# AppImage recipe for Sqyre.
# Run from repo root: .devcontainer/builds/linux/packaging/appimage/build-appimage.sh
# Or from this directory: ./build-appimage.sh
# Uses sqyre.AppDir (set via build-appimage.sh --appdir).
#
# Bundle OpenCV, Tesseract, and their deps; use host for libs on the AppImage excludelist
# (libGL, libGLX, libGLdispatch, libX11, libxcb, libX11-xcb, libstdc++, libgcc_s, libz).
# Only the host's glibc/ld and excludelist libs are used from the system.
# Script installs the binary and metadata; appimage-builder then traces and bundles .so files.
# We do not use the recipe "apt" section because appimage-builder has a bug comparing
# Ubuntu package versions (e.g. "1.22.6ubuntu6") with packaging.version.parse().

version: 1
script:
  - cd "$SOURCE_DIR/../../../../.."
  - go build -trimpath -o "$TARGET_APPDIR/usr/bin/sqyre" ./cmd/sqyre
  - install -Dm00644 internal/assets/icons/sqyre.png "$TARGET_APPDIR/usr/share/icons/hicolor/256x256/apps/com.sqyre.app.png"
  - install -Dm00644 "$SOURCE_DIR/com.sqyre.app.desktop" "$TARGET_APPDIR/usr/share/applications/com.sqyre.app.desktop"
  # Bundle Tesseract English data so OCR works without system tessdata.
  # Ubuntu 22.04 places tessdata under /usr/share/tesseract-ocr/4.00/tessdata/,
  # other distros may use /usr/share/tessdata/ or /usr/share/tesseract-ocr/5/tessdata/.
  - mkdir -p "$TARGET_APPDIR/usr/share/tessdata"
  - |
    eng=""
    for d in /usr/share/tesseract-ocr/*/tessdata /usr/share/tessdata /usr/local/share/tessdata; do
      if [ -f "$d/eng.traineddata" ]; then eng="$d/eng.traineddata"; break; fi
    done
    if [ -n "$eng" ]; then
      cp "$eng" "$TARGET_APPDIR/usr/share/tessdata/"
    else
      echo "WARNING: eng.traineddata not found; Tesseract OCR will not work in the AppImage" >&2
    fi
  # Explicitly bundle OpenCV, Tesseract, and Leptonica shared libraries.
  # appimage-builder tracing may miss libs whose code paths aren't exercised
  # during the brief strace run.
  - mkdir -p "$TARGET_APPDIR/usr/lib"
  - |
    # OpenCV (built from source, installed to /usr/local/lib)
    cp -aL /usr/local/lib/libopencv_*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    # Tesseract and Leptonica (from system packages)
    cp -aL /usr/lib/x86_64-linux-gnu/libtesseract.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    cp -aL /usr/lib/x86_64-linux-gnu/liblept.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    # Transitive deps of OpenCV imgcodecs, Tesseract, and other bundled libs
    for dep in libjpeg libpng libtiff libwebp libopenjp2 libIlmImf libHalf libgif libarchive; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done
    # X11 (Fyne/GLFW): bundle only libs not on excludelist (host provides libX11, libxcb, libX11-xcb, libGL, libGLX, libGLdispatch)
    for dep in libXtst libxkbcommon libxkbcommon-x11 libXau libXdmcp libXext; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done
    # Other libs (excludelist: do not bundle libstdc++, libgcc_s, libz — use host)
    for dep in libgomp libzstd liblzma liblz4 libbz2; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done
    # Image/archive transitive deps (libmd is dependency of libbsd)
    for dep in libjbig libdeflate libnettle libacl libxml2 libbsd libmd; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done
    # ICU (libxml2 dependency)
    for dep in libicuuc libicudata libicui18n; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done

AppDir:
  path: "{{ TARGET_APPDIR }}"
  app_info:
    id: com.sqyre.app
    name: Sqyre
    icon: com.sqyre.app
    version: "0.5.0"
    exec: usr/bin/sqyre
    exec_args: "$@"
  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*
  runtime:
    env:
      TESSDATA_PREFIX: "${APPDIR}/usr/share/tessdata"
      APPDIR_LIBRARY_PATH: "${APPDIR}/usr/lib:${APPDIR}/lib/x86_64"

AppImage:
  arch: x86_64
  file_name: Sqyre-0.5.0-x86_64.AppImage
