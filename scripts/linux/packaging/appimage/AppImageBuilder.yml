# AppImage recipe for Sqyre (Rust / PureCV / Tesseract).
# Run from repo root: scripts/linux/packaging/appimage/build-appimage.sh
#
# Script installs the binary and metadata; appimage-builder then
# traces the binary and bundles required .so files (Tesseract, X11, etc.).
# We do not use the recipe "apt" section because appimage-builder has a bug comparing
# Ubuntu package versions (e.g. "1.22.6ubuntu6") with packaging.version.parse().

version: 1
script:
  - |
    set -euo pipefail
    ROOT="$(cd "$SOURCE_DIR/../../../.." && pwd)"
    cd "$ROOT"
    export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:/usr/local/cargo/bin:${PATH:-/usr/bin:/bin}"
    if [ -x "$ROOT/.cargo-home/bin/cargo" ]; then
      export CARGO_HOME="$ROOT/.cargo-home"
      export PATH="$CARGO_HOME/bin:$PATH"
    fi
    if [ -d "$ROOT/.rustup-home" ]; then
      export RUSTUP_HOME="$ROOT/.rustup-home"
    fi
    if ! command -v cargo >/dev/null 2>&1; then
      echo "ERROR: cargo not found on PATH=$PATH" >&2
      exit 1
    fi
    TARGET_DIR="${CARGO_TARGET_DIR:-$ROOT/target}"
    export CARGO_TARGET_DIR="$TARGET_DIR"
    echo "cargo=$(command -v cargo) target=$TARGET_DIR"
    (cd "$ROOT" && cargo build -p sqyre-app --release)
    if [ ! -x "$TARGET_DIR/release/sqyre" ]; then
      echo "ERROR: missing $TARGET_DIR/release/sqyre after cargo build" >&2
      exit 1
    fi
    ICON="$ROOT/crates/sqyre-app/assets/icons/sqyre.png"
    install -Dm00755 "$TARGET_DIR/release/sqyre" "$TARGET_APPDIR/usr/bin/sqyre"
    install -Dm00644 "$ICON" "$TARGET_APPDIR/usr/share/icons/hicolor/256x256/apps/com.sqyre.app.png"
    # Also place icon at AppDir root name expected by app_info.icon
    install -Dm00644 "$ICON" "$TARGET_APPDIR/com.sqyre.app.png"
    install -Dm00644 "$SOURCE_DIR/com.sqyre.app.desktop" "$TARGET_APPDIR/usr/share/applications/com.sqyre.app.desktop"
    install -Dm00644 "$SOURCE_DIR/com.sqyre.app.desktop" "$TARGET_APPDIR/com.sqyre.app.desktop"
    # Bundle Tesseract English data so OCR works without system tessdata.
    mkdir -p "$TARGET_APPDIR/usr/share/tessdata"
    eng=""
    for d in "$ROOT/assets/tessdata" /usr/share/tesseract-ocr/*/tessdata /usr/share/tessdata /usr/local/share/tessdata; do
      if [ -f "$d/eng.traineddata" ]; then eng="$d/eng.traineddata"; break; fi
    done
    if [ -n "$eng" ]; then
      cp "$eng" "$TARGET_APPDIR/usr/share/tessdata/"
    else
      echo "WARNING: eng.traineddata not found; Tesseract OCR will not work in the AppImage" >&2
    fi
    # Explicitly bundle Tesseract and Leptonica (strace may miss them).
    mkdir -p "$TARGET_APPDIR/usr/lib"
    cp -aL /usr/lib/x86_64-linux-gnu/libtesseract.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    cp -aL /usr/lib/x86_64-linux-gnu/liblept.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    for dep in libjpeg libpng libtiff libjbig libwebp libdeflate libgif libarchive libbz2 libzstd liblz4; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done

AppDir:
  path: "{{ TARGET_APPDIR }}"
  app_info:
    id: com.sqyre.app
    name: Sqyre
    icon: com.sqyre.app
    version: "__APP_VERSION__"
    exec: usr/bin/sqyre
    exec_args: "$@"
  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*
  runtime:
    env:
      TESSDATA_PREFIX: "${APPDIR}/usr/share/tessdata"
      SQYRE_TESSDATA: "${APPDIR}/usr/share/tessdata"
      APPDIR_LIBRARY_PATH: "${APPDIR}/usr/lib:${APPDIR}/lib/x86_64"

AppImage:
  arch: x86_64
  file_name: Sqyre-__APP_VERSION__-x86_64.AppImage
