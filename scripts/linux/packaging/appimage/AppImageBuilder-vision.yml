# AppImage with sqyre + embedded sqyre-vision sidecar.
# Run: scripts/linux/packaging/appimage/build-appimage-vision.sh
version: 1
script:
  - cd "$SOURCE_DIR/../../../.."
  - go build -trimpath -tags "__BUILD_TAGS__" -o "$TARGET_APPDIR/usr/bin/sqyre" ./cmd/sqyre
  - scripts/vision/download-models.sh
  - CGO_ENABLED=1 go build -trimpath -tags "detector_onnx,vision_embed" -o "$TARGET_APPDIR/usr/bin/sqyre-vision" ./cmd/sqyre-vision
  - install -Dm00644 internal/assets/icons/sqyre.png "$TARGET_APPDIR/usr/share/icons/hicolor/256x256/apps/com.sqyre.app.png"
  - install -Dm00644 "$SOURCE_DIR/com.sqyre.app.desktop" "$TARGET_APPDIR/usr/share/applications/com.sqyre.app.desktop"
  - mkdir -p "$TARGET_APPDIR/usr/share/tessdata"
  - |
    eng=""
    for d in /usr/share/tesseract-ocr/*/tessdata /usr/share/tessdata /usr/local/share/tessdata; do
      if [ -f "$d/eng.traineddata" ]; then eng="$d/eng.traineddata"; break; fi
    done
    if [ -n "$eng" ]; then
      cp "$eng" "$TARGET_APPDIR/usr/share/tessdata/"
    else
      echo "WARNING: eng.traineddata not found" >&2
    fi
  - mkdir -p "$TARGET_APPDIR/usr/lib"
  - |
    opencv_lib=""
    for d in /opt/opencv/linux/install/lib /usr/local/lib; do
      for _cv in "$d"/libopencv_core.so*; do
        if [ -e "$_cv" ]; then opencv_lib="$d"; break 2; fi
      done
    done
    if [ -z "$opencv_lib" ]; then
      echo "ERROR: OpenCV .so not found" >&2
      exit 1
    fi
    cp -aL "$opencv_lib"/libopencv_*.so* "$TARGET_APPDIR/usr/lib/"
    cp -aL /usr/lib/x86_64-linux-gnu/libtesseract.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    cp -aL /usr/lib/x86_64-linux-gnu/liblept.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    for dep in libjpeg libpng libtiff libjbig libwebp libdeflate libopenjp2 libIlmImf libHalf libgif libarchive libbz2 libzstd liblz4 libnettle libacl libxml2 libicuuc libicudata; do
      cp -aL /usr/lib/x86_64-linux-gnu/${dep}*.so* "$TARGET_APPDIR/usr/lib/" 2>/dev/null || true
    done
    ORT_CACHE="$SOURCE_DIR/../../../scripts/vision/.cache"
  - |
    ORT_LIB=""
    for f in "$SOURCE_DIR/../../../scripts/vision/.cache/libonnxruntime.so" \
             "$SOURCE_DIR/../../../internal/vision/embedmodels/bundled/libonnxruntime.so"; do
      if [ -f "$f" ]; then ORT_LIB="$f"; break; fi
    done
    if [ -n "$ORT_LIB" ]; then
      cp -aL "$ORT_LIB" "$TARGET_APPDIR/usr/lib/libonnxruntime.so"
    else
      echo "WARNING: libonnxruntime not found; run scripts/vision/download-models.sh first" >&2
    fi

AppDir:
  path: "{{ TARGET_APPDIR }}"
  app_info:
    id: com.sqyre.app
    name: Sqyre
    icon: com.sqyre.app
    version: "__APP_VERSION__"
    exec: usr/bin/sqyre
    exec_args: "$@"
  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*
  runtime:
    env:
      TESSDATA_PREFIX: "${APPDIR}/usr/share/tessdata"
      APPDIR_LIBRARY_PATH: "${APPDIR}/usr/lib:${APPDIR}/lib/x86_64"
      SQUIRE_VISION_WORKER: "${APPDIR}/usr/bin/sqyre-vision"
      SQUIRE_ORT_LIB: "${APPDIR}/usr/lib/libonnxruntime.so"

AppImage:
  arch: x86_64
  file_name: Sqyre-Vision-__APP_VERSION____APP_SUFFIX__-x86_64.AppImage
