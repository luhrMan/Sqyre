# Build and release Sqyre on merge to main.
# Releases: Linux binary + AppImage, Windows .exe (MinGW cross), WASM editor zip.
# Also compile-checks Windows (GDI capture) and macOS (stub capture) on PRs/pushes.
# Release tag / artifact names: vYYYY.MM.DD.HHMM (e.g. v2026.03.03.1643).

name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared with docker run mounts (see jobs below).
  CARGO_HOME_DIR: .cache/cargo
  CARGO_TARGET_DIR_HOST: target

jobs:
  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Set version
        id: version
        run: echo "VERSION=$(date +%Y.%m.%d.%H%M)" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: GHCR image ref for Buildx cache
        id: ghcr
        run: |
          o=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          n=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "buildcache=ghcr.io/${o}/${n}-buildcache:linux" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry (Buildx cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: sqyre-linux-build:latest
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }}
            type=gha,scope=sqyre-linux
          cache-to: |
            type=gha,mode=max,scope=sqyre-linux
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }},mode=max

      - name: Cache tessdata
        id: tessdata-test
        uses: actions/cache@v6
        with:
          path: assets/tessdata
          key: tessdata-eng-v2

      - name: Download tessdata
        if: steps.tessdata-test.outputs.cache-hit != 'true'
        run: ./scripts/download-tessdata.sh

      # Registry/git downloads change with the lockfile + toolchain image.
      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_HOME_DIR }}
          key: ${{ runner.os }}-cargo-reg-${{ hashFiles('Cargo.lock', '.devcontainer/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reg-

      # Incremental artifacts; keyed separately so registry hits still help when target misses.
      - name: Cache Cargo target
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_TARGET_DIR_HOST }}
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('Cargo.lock', '.devcontainer/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Prepare Cargo cache dirs
        run: mkdir -p "${{ env.CARGO_HOME_DIR }}" "${{ env.CARGO_TARGET_DIR_HOST }}"

      - name: Run Rust quality checks and tests
        run: |
          docker run --rm -u "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            -e HOME=/tmp \
            -e CARGO_HOME=/workspace/${{ env.CARGO_HOME_DIR }} \
            -e CARGO_TARGET_DIR=/workspace/${{ env.CARGO_TARGET_DIR_HOST }} \
            -e RUSTUP_HOME=/usr/local/rustup \
            -e PATH=/usr/local/cargo/bin:/usr/bin:/bin \
            -e WGPU_BACKEND=vulkan \
            -e VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json \
            sqyre-linux-build \
            bash -c 'set -euo pipefail
              make check
              make machete
              make test'

      - name: Coverage report
        run: |
          docker run --rm -u "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            -e HOME=/tmp \
            -e CARGO_HOME=/workspace/${{ env.CARGO_HOME_DIR }} \
            -e CARGO_TARGET_DIR=/workspace/${{ env.CARGO_TARGET_DIR_HOST }} \
            -e RUSTUP_HOME=/usr/local/rustup \
            -e PATH=/usr/local/cargo/bin:/usr/bin:/bin \
            -e WGPU_BACKEND=vulkan \
            -e VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json \
            sqyre-linux-build \
            bash -c 'set -euo pipefail
              make coverage'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: |
            target/coverage/html
            target/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

  check-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg-binaries
      # File-based binary cache (x-gha was removed from vcpkg); restored via actions/cache.
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg-binaries,readwrite
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Cache LLVM install
        id: llvm-cache
        uses: actions/cache@v6
        with:
          path: C:\Program Files\LLVM
          key: ${{ runner.os }}-llvm-choco-v1

      - name: Install LLVM (bindgen) and pkg-config
        run: |
          if ("${{ steps.llvm-cache.outputs.cache-hit }}" -ne "true") {
            choco install llvm -y
          }
          choco install pkgconfiglite -y

      - name: Cache vcpkg binaries
        uses: actions/cache@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-bin-leptess-x64-windows-v1
          restore-keys: |
            ${{ runner.os }}-vcpkg-bin-leptess-x64-windows-

      - name: Prepare vcpkg binary cache dir
        run: New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null

      - name: Install leptonica and tesseract (vcpkg)
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install leptonica:x64-windows tesseract:x64-windows

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-reg-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reg-

      - name: Cache Cargo target
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: cargo check (sqyre-app)
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          $env:PKG_CONFIG_PATH = "$($env:VCPKG_INSTALLATION_ROOT)\installed\x64-windows\lib\pkgconfig"
          cargo check -p sqyre-app

  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Cache Homebrew bottles
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-tesseract-leptonica-v1
          restore-keys: |
            ${{ runner.os }}-brew-tesseract-leptonica-

      - name: Install Tesseract / Leptonica
        run: brew install tesseract leptonica

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-reg-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reg-

      - name: Cache Cargo target
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: cargo check (sqyre-app)
        run: cargo check -p sqyre-app

  build-linux:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: version
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Write VERSION
        run: echo "${{ needs.version.outputs.version }}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: GHCR image ref for Buildx cache
        id: ghcr
        run: |
          o=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          n=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "buildcache=ghcr.io/${o}/${n}-buildcache:linux" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry (Buildx cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: sqyre-linux-build:latest
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }}
            type=gha,scope=sqyre-linux
          cache-to: |
            type=gha,mode=max,scope=sqyre-linux
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }},mode=max

      - name: Cache tessdata
        id: tessdata-linux
        uses: actions/cache@v6
        with:
          path: assets/tessdata
          key: tessdata-eng-v2

      - name: Download tessdata
        if: steps.tessdata-linux.outputs.cache-hit != 'true'
        run: ./scripts/download-tessdata.sh

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_HOME_DIR }}
          key: ${{ runner.os }}-cargo-reg-${{ hashFiles('Cargo.lock', '.devcontainer/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reg-

      - name: Cache Cargo target
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_TARGET_DIR_HOST }}
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('Cargo.lock', '.devcontainer/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Prepare Cargo cache dirs
        run: mkdir -p "${{ env.CARGO_HOME_DIR }}" "${{ env.CARGO_TARGET_DIR_HOST }}"

      - name: Build Linux binary and AppImage
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          docker run --rm -u "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            -e HOME=/tmp \
            -e CARGO_HOME=/workspace/${{ env.CARGO_HOME_DIR }} \
            -e CARGO_TARGET_DIR=/workspace/${{ env.CARGO_TARGET_DIR_HOST }} \
            -e RUSTUP_HOME=/usr/local/rustup \
            -e PATH=/usr/local/cargo/bin:/usr/local/bin:/usr/bin:/bin \
            -e RELEASE_VERSION="$VERSION" \
            -e SQYRE_APPIMAGE_FORCE_NATIVE=1 \
            sqyre-linux-build \
            bash -c 'set -euo pipefail
              scripts/linux/packaging/appimage/build-appimage.sh
              cp scripts/linux/packaging/appimage/sqyre.AppDir/usr/bin/sqyre \
                "/workspace/sqyre-v${RELEASE_VERSION}-linux-amd64"'
          mv "bin/Sqyre-${VERSION}-x86_64.AppImage" \
             "Sqyre-v${VERSION}-x86_64.AppImage"

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Zip Linux binary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          zip -9 "sqyre-v${VERSION}-linux-amd64.zip" \
            "sqyre-v${VERSION}-linux-amd64"

      - name: Zip Linux AppImage
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          zip -9 "Sqyre-v${VERSION}-x86_64.AppImage.zip" \
            "Sqyre-v${VERSION}-x86_64.AppImage"

      - name: Upload Linux binary artifact (zipped)
        uses: actions/upload-artifact@v7
        with:
          name: linux-binary-zip
          path: sqyre-v${{ needs.version.outputs.version }}-linux-amd64.zip

      - name: Upload Linux AppImage artifact (zipped)
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-zip
          path: Sqyre-v${{ needs.version.outputs.version }}-x86_64.AppImage.zip

  build-windows:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: version
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: GHCR image ref for Buildx cache
        id: ghcr
        run: |
          o=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          n=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "buildcache=ghcr.io/${o}/${n}-buildcache:windows" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry (Buildx cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows cross image
        uses: docker/build-push-action@v7
        with:
          context: scripts/windows
          file: scripts/windows/Dockerfile
          load: true
          tags: sqyre-windows-cross:latest
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }}
            type=gha,scope=sqyre-windows
          cache-to: |
            type=gha,mode=max,scope=sqyre-windows
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }},mode=max

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_HOME_DIR }}
          key: ${{ runner.os }}-cargo-reg-windows-${{ hashFiles('Cargo.lock', 'scripts/windows/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reg-windows-
            ${{ runner.os }}-cargo-reg-

      - name: Cache Cargo target (Windows cross)
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_TARGET_DIR_HOST }}
          key: ${{ runner.os }}-cargo-target-windows-${{ hashFiles('Cargo.lock', 'scripts/windows/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-windows-

      - name: Prepare Cargo cache dirs
        run: mkdir -p "${{ env.CARGO_HOME_DIR }}" "${{ env.CARGO_TARGET_DIR_HOST }}" bin

      - name: Build Windows binary
        env:
          SQYRE_WINDOWS_IMAGE: sqyre-windows-cross:latest
          CARGO_HOME: ${{ github.workspace }}/${{ env.CARGO_HOME_DIR }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/${{ env.CARGO_TARGET_DIR_HOST }}
        run: ./scripts/windows/build.sh

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Zip Windows binary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cp -f bin/sqyre.exe "sqyre-v${VERSION}-windows-amd64.exe"
          zip -9 "sqyre-v${VERSION}-windows-amd64.zip" \
            "sqyre-v${VERSION}-windows-amd64.exe"

      - name: Upload Windows binary artifact (zipped)
        uses: actions/upload-artifact@v7
        with:
          name: windows-binary-zip
          path: sqyre-v${{ needs.version.outputs.version }}-windows-amd64.zip

  build-wasm:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: version
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: GHCR image ref for Buildx cache
        id: ghcr
        run: |
          o=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          n=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "buildcache=ghcr.io/${o}/${n}-buildcache:linux" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry (Buildx cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: sqyre-linux-build:latest
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }}
            type=gha,scope=sqyre-linux
          cache-to: |
            type=gha,mode=max,scope=sqyre-linux
            type=registry,ref=${{ steps.ghcr.outputs.buildcache }},mode=max

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_HOME_DIR }}
          key: ${{ runner.os }}-cargo-reg-wasm-${{ hashFiles('Cargo.lock', '.devcontainer/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reg-wasm-
            ${{ runner.os }}-cargo-reg-

      - name: Cache Cargo target (WASM)
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_TARGET_DIR_HOST }}
          key: ${{ runner.os }}-cargo-target-wasm-${{ hashFiles('Cargo.lock', '.devcontainer/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-wasm-

      - name: Prepare Cargo cache dirs
        run: mkdir -p "${{ env.CARGO_HOME_DIR }}" "${{ env.CARGO_TARGET_DIR_HOST }}"

      - name: Build WASM editor
        run: |
          docker run --rm -u "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            -e HOME=/tmp \
            -e CARGO_HOME=/workspace/${{ env.CARGO_HOME_DIR }} \
            -e CARGO_TARGET_DIR=/workspace/${{ env.CARGO_TARGET_DIR_HOST }} \
            -e RUSTUP_HOME=/usr/local/rustup \
            -e PATH=/usr/local/cargo/bin:/usr/local/bin:/usr/bin:/bin \
            sqyre-linux-build \
            bash -c 'set -euo pipefail
              make wasm
              test -f bin/wasm/index.html'

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Zip WASM editor
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          (cd bin/wasm && zip -9r "../../sqyre-v${VERSION}-wasm.zip" .)

      - name: Upload WASM artifact (zipped)
        uses: actions/upload-artifact@v7
        with:
          name: wasm-editor-zip
          path: sqyre-v${{ needs.version.outputs.version }}-wasm.zip

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-linux, build-windows, build-wasm]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download release zip artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-zip"
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-linux.outputs.version }}
          name: Release v${{ needs.build-linux.outputs.version }}
          files: |
            artifacts/linux-binary-zip/*.zip
            artifacts/linux-appimage-zip/*.zip
            artifacts/windows-binary-zip/*.zip
            artifacts/wasm-editor-zip/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
