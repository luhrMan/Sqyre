<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="{{ "/" | relURL }}" class="logo">Sqyre</a>
      <a href="{{ "/features/" | relURL }}">Features</a>
      <a href="{{ "/build/" | relURL }}">Build</a>
    </nav>
  </header>
  <main class="main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>Sqyre — Macro builder. Written in Go. Fyne, Robotgo, Tesseract, OpenCV.</p>
  </footer>
</body>
</html>
