<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sqyre (WASM editor)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    overflow: hidden;
  }
  #sqyre_canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
<body>
  <canvas id="sqyre_canvas"></canvas>
  <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="2" data-bin="sqyre" data-cargo-no-default-features />
</body>
</html>
